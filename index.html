<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">

  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>

    <main >
        <article class="card" >
                <img class="header-image" src="./assets/images/illustration-article.svg" alt="Illustrative design" />

                <div class="card-text-block" >
                    <span class="text-preset-4 tag">Learning</span>

                    <p class="text-preset-3">Published 21 Dec 2023</p>

                    <h1 class="text-preset-1">HTML & CSS foundations</h1>

                    <p class="text-preset-2 body-text">
                    These languages are the backbone of every website, defining structure, content, and presentation.
                    </p>

                </div>

                <div class="user-profile" >
                <img src="./assets/images/image-avatar.webp" alt="user profile image" />
                <p class="text-preset-4">Greg Hooper</p>
                </div >

        </article>

    </main>

</body>
</html>
